name: Build pipeline

on:
  workflow_dispatch:
    
jobs:
  build:
    name: Build, Scan, Quality Gate and Docker Build
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Build the Java application and create target/*.jar
      - name: Build Maven Package
        run: mvn clean package

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run Trivy Filesystem Scan
        run: |
          trivy fs . \
            --format table \
            --output reports/trivy-report.txt

      - name: Trivy Scan Built JAR
        run: |
          trivy fs target/java-devsecops-demo-1.0-SNAPSHOT.jar \
            --format table \
            --output reports/trivy-jar-report.txt

      # Run SonarQube analysis (uses the Maven Sonar scanner)
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=java-project \
            -Dsonar.projectName=java-project \
            -Dsonar.host.url=http://13.60.50.252:9000 \
            -Dsonar.token=$SONAR_TOKEN

      - name: Prepare SonarQube Quality Gate Metadata
        run: |
           mkdir -p .scannerwork
           pwd

           if [ -f target/sonar/report-task.txt ]; then
             cp target/sonar/report-task.txt .scannerwork/report-task.txt
           elif [ -f .scannerwork/report-task.txt ]; then
             echo "report-task.txt already exists"
           else
             echo "report-task.txt not found"
             find . -name report-task.txt
             exit 1
           fi

      # Wait for SonarQube to compute and return the Quality Gate result
      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://13.60.50.252:9000

      # Verify the JAR exists
      - name: Verify Target Directory
        run: ls -lh target

      # Build a runnable Docker image
      - name: Build Docker Image
        run: |
          docker build -t java-project:latest .

      # Confirm the image was created
      - name: Verify Docker Image
        run: docker images

      - name: Start PostgreSQL Container
        run: |
          # Remove old container if it exists
          docker rm -f postgres || true

          # Create persistent volume if it does not exist
          docker volume create postgres_data || true

          # Start PostgreSQL
          docker run -d \
            --name postgres \
            -e POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -p 5432:5432 \
            -v postgres_data:/var/lib/postgresql/data \
            postgres:16

      - name: Wait for PostgreSQL to Become Ready
        run: |
          echo "Waiting for PostgreSQL..."
          until docker exec postgres pg_isready \
            -U "${{ secrets.POSTGRES_USER }}" \
            -d "${{ secrets.POSTGRES_DB }}"; do
            sleep 2
          done
          echo "PostgreSQL is ready."
      - name: Start Java Application Container
        run: |
          docker rm -f java-project || true

          docker run -d \
            --name java-project \
            --link postgres:postgres \
            -p 8080:8080 \
            -e DB_URL=jdbc:postgresql://postgres:5432/${{ secrets.POSTGRES_DB }} \
            -e DB_USER=${{ secrets.POSTGRES_USER }} \
            -e DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            java-project:latest 
      - name: Verify Application Response
        run: |
          sleep 5
          curl http://localhost:8080

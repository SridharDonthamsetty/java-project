name: Java DevSecOps Pipeline

on:
  workflow_dispatch:

jobs:
  checkout-code:
    name: Checkout Repository
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Display Working Directory
        run: pwd

      - name: List Repository Files
        run: ls -la

  install-trivy:
    name: Install Trivy
    runs-on: self-hosted
    needs: checkout-code

    steps:
      - name: Install Trivy
        run: |
          if command -v trivy >/dev/null 2>&1; then
            echo "Trivy is already installed"
            trivy --version
            exit 0
          fi

          sudo apt-get update -y
          sudo apt-get install -y wget gnupg lsb-release apt-transport-https

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Verify Trivy Installation
        run: trivy --version
  trivy-scan:
    name: Trivy Scan
    runs-on: self-hosted
    needs: install-trivy

    steps:
      - name: checkout repo
        uses: actions/checkout@v4
          
      - name: Create Reports Directory
        run: mkdir -p reports

      - name: maven package
        run: mvn clean package

      - name: Run Trivy Filesystem Scan
        run: |
          trivy fs . \
            --format table \
            --output reports/trivy-report.txt

      - name: Scan Built JAR
        run: |
          trivy fs target/java-devsecops-demo-1.0-SNAPSHOT.jar \
            --format table \
            --output reports/trivy-jar-report.txt

      - name: Display Report Details
        run: |
           echo "Trivy report generated successfully"
           ls -lh reports/

  sonarqube-scan:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: trivy-scan

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build and Analyze with Maven
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=java-project \
            -Dsonar.projectName=java-project \
            -Dsonar.host.url=http://13.48.43.93:9000 \
            -Dsonar.token=$SONAR_TOKEN
      - name: Upload Sonar Scanner Metadata
        uses: actions/upload-artifact@v4
        with:
          name: sonar-scannerwork
          path: target/sonar/report-task.txt
            
  sonarqube-quality-gate:
    name: SonarQube Quality Gate
    runs-on: self-hosted
    needs: sonarqube-scan

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Download Sonar Scanner Metadata
        uses: actions/download-artifact@v4
        with:
          name: sonar-scannerwork
          path: .scannerwork

      - name: Verify Downloaded File
        run: ls -la .scannerwork
        
      - name: Wait for Quality Gate Result
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://13.48.43.93:9000
